<!DOCTYPE html>
<html lang="tr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKO&RIS — 2026 Bahar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
            padding-top: 20px;
            padding-bottom: 50px;
        }
        .card {
            margin-bottom: 20px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header-rko { background-color: #2c3e50; color: white; }
        .header-ris { background-color: #27ae60; color: white; }
        .header-teachers { background-color: #8e44ad; color: white; }
        .total-row {
            font-weight: bold;
            background-color: rgba(0,0,0,0.05) !important;
        }
        [data-bs-theme="dark"] .total-row {
            background-color: rgba(255,255,255,0.1) !important;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
            <a href="../index.html" class="btn btn-outline-secondary btn-sm">← Dashboard</a>
            <h1 class="fw-bold mb-0">2026 Bahar</h1>
        </div>
        <button id="themeToggle" class="btn btn-outline-primary">🌙 Dark Mod</button>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header header-rko text-center">
                    <h4>Kuran Okulu (RKO)</h4>
                </div>
                <ul class="list-group list-group-flush" id="rko-list">
                    <li class="list-group-item text-center">Yükleniyor...</li>
                </ul>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header header-ris text-center">
                    <h4>İslam Okulu (RIS)</h4>
                </div>
                <ul class="list-group list-group-flush" id="ris-list">
                    <li class="list-group-item text-center">Yükleniyor...</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="row justify-content-center mt-4">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header header-teachers text-center">
                    <h4>Öğretmen Kayıt Durumu</h4>
                </div>
                <div class="card-body p-0">
                    <table class="table table-striped table-hover mb-0 text-center">
                        <thead>
                            <tr>
                                <th class="text-start ps-4">Öğretmen İsmi</th>
                                <th>Kayıt Durumu (Gel/Top)</th>
                                <th>Başarı Yüzdesi</th>
                            </tr>
                        </thead>
                        <tbody id="teachers-list">
                            <tr><td colspan="3">Veriler yükleniyor...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function renderSchoolList(schoolData, elementId) {
        const listContainer = document.getElementById(elementId);
        if (!schoolData) {
            listContainer.innerHTML = '<li class="list-group-item text-danger">Veri bulunamadı</li>';
            return;
        }
        let totalStudents = 0;
        let htmlContent = "";
        schoolData.forEach(program => {
            const totalCount = program.count || 0;
            const newCount = program.new || 0;
            let oldCount = totalCount - newCount;
            if (oldCount < 0) oldCount = 0;
            totalStudents += totalCount;
            let newPercent = totalCount > 0 ? Math.round((newCount / totalCount) * 100) : 0;
            let oldPercent = totalCount > 0 ? Math.round((oldCount / totalCount) * 100) : 0;
            htmlContent += `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span class="fw-medium">${program.name}</span>
                    <div class="d-flex align-items-center">
                        ${totalCount > 0 ? `
                        <div class="me-3 text-end" style="font-size: 0.7rem; line-height: 1.1; opacity: 0.8;">
                            <div class="text-success">Yeni: <strong>${newCount}</strong> <span class="text-muted">(%${newPercent})</span></div>
                            <div class="text-secondary">Eski: <strong>${oldCount}</strong> <span class="text-muted">(%${oldPercent})</span></div>
                        </div>` : ''}
                        <span class="badge bg-primary rounded-pill" style="min-width: 40px;">${totalCount}</span>
                    </div>
                </li>`;
        });
        htmlContent += `
            <li class="list-group-item d-flex justify-content-between align-items-center total-row">
                TOPLAM ÖĞRENCİ
                <span class="badge bg-dark rounded-pill" style="min-width: 40px;">${totalStudents}</span>
            </li>`;
        listContainer.innerHTML = htmlContent;
    }

    function renderTeachersTable(teacherData) {
        const tableBody = document.getElementById('teachers-list');
        if (!teacherData) {
            tableBody.innerHTML = '<tr><td colspan="3" class="text-danger">Veri bulunamadı</td></tr>';
            return;
        }
        let totalArrived = 0;
        let totalPossible = 0;
        let htmlContent = "";
        teacherData.forEach(teacher => {
            totalArrived += teacher.arrived;
            totalPossible += teacher.total;
            let percentage = teacher.total > 0 ? ((teacher.arrived / teacher.total) * 100).toFixed(1) : 0;
            let badgeColor = percentage < 25 ? 'bg-danger' : (percentage < 70 ? 'bg-warning text-dark' : 'bg-success');
            htmlContent += `
                <tr>
                    <td class="text-start ps-4">${teacher.name}</td>
                    <td>${teacher.arrived} / ${teacher.total}</td>
                    <td>
                        <div class="progress" style="height: 20px;">
                            <div class="progress-bar ${badgeColor}" role="progressbar" style="width: ${percentage}%">%${percentage}</div>
                        </div>
                    </td>
                </tr>`;
        });
        let totalPercentage = totalPossible > 0 ? ((totalArrived / totalPossible) * 100).toFixed(1) : 0;
        htmlContent += `
            <tr class="total-row">
                <td class="text-start ps-4">GENEL TOPLAM</td>
                <td><strong>${totalArrived} / ${totalPossible}</strong></td>
                <td><strong>%${totalPercentage}</strong></td>
            </tr>`;
        tableBody.innerHTML = htmlContent;
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetch('./kayit.json')
            .then(r => { if (!r.ok) throw new Error(`HTTP hata: ${r.status}`); return r.json(); })
            .then(data => {
                renderSchoolList(data.rko, 'rko-list');
                renderSchoolList(data.ris, 'ris-list');
                renderTeachersTable(data.teachers);
            })
            .catch(error => {
                document.getElementById('rko-list').innerHTML = `<li class="list-group-item text-danger">Veri yüklenemedi: ${error.message}</li>`;
            });

        const toggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        toggleBtn.addEventListener('click', () => {
            const newTheme = htmlElement.getAttribute('data-bs-theme') === 'light' ? 'dark' : 'light';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            toggleBtn.textContent = newTheme === 'light' ? '🌙 Dark Mod' : '☀️ Light Mod';
            toggleBtn.classList.toggle('btn-outline-primary');
            toggleBtn.classList.toggle('btn-outline-warning');
        });
    });
</script>
</body>
</html>
